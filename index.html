<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MyExpense</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="theme-color" content="#4CAF50">


<style>
*{box-sizing:border-box}
body{margin:0;font-family:"Segoe UI",Arial;background:#f4f6fb}
.app{max-width:430px;margin:auto;padding:14px;padding-bottom:140px}
header{text-align:center;font-size:22px;font-weight:700;margin-bottom:12px}

/* WALLET */
.wallet{
  background:linear-gradient(135deg,#22c55e,#16a34a);
  color:white;
  border-radius:28px;
  padding:20px;
  position:relative;
  box-shadow:0 20px 40px rgba(34,197,94,.35);
  overflow:hidden;
}

/* soft shine effect */
.wallet::after{
  content:"";
  position:absolute;
  top:-40%;
  right:-40%;
  width:200px;
  height:200px;
  background:rgba(255,255,255,.15);
  border-radius:50%;
}

.wallet h1{
  margin:8px 0;
  font-size:38px;
  font-weight:800;
  letter-spacing:1px;
}

.wallet-row{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  margin-top:12px;
  background:rgba(255,255,255,.18);
  padding:10px 14px;
  border-radius:16px;
}

.progress{
  background:rgba(255,255,255,.25);
  height:10px;
  border-radius:12px;
  overflow:hidden;
  margin-top:12px;
}

.progress-fill{
  height:100%;
  background:linear-gradient(90deg,#fff,#dcfce7);
  transition:.6s;
}

.wallet-btn{
  position:absolute;
  right:14px;
  background:rgba(255,255,255,.25);
  border:none;
  color:white;
  padding:6px 14px;
  border-radius:20px;
  font-size:12px;
  font-weight:700;
  backdrop-filter: blur(6px);
  cursor:pointer;
  z-index:2; /* keeps button above effects */
}


/* ACTIONS */
.actions{display:flex;gap:10px;margin-top:14px}
.actions button{flex:1;padding:12px;border-radius:16px;border:none;background:#fff;font-weight:700}

/* CARDS */
.card{background:#fff;border-radius:20px;padding:14px;margin-top:14px}
.quick{
  display:flex;
  gap:12px;              /* more gap */
  flex-wrap:wrap;
  margin-top:10px;       /* space from title */
}

.quick button{
  background:#eef2ff;
  border:none;
  padding:14px 16px;     /* taller buttons */
  border-radius:18px;
  font-weight:600;
  min-width:120px;       /* prevents squeezing */
  text-align:center;
}

.edit-btn{font-size:13px;color:#2563eb;cursor:pointer;margin-left:6px}

/* QUICK SETUP */
.quick-setup input{
  width:100%;padding:12px;margin-top:8px;
  border-radius:14px;border:1px solid #ddd
}

/* HISTORY */
.day-card{background:#f9fafb;border-radius:16px;padding:12px;margin-top:12px}
.day-title{font-weight:700;margin-bottom:6px}
.expense{display:flex;justify-content:space-between;font-size:14px;margin-top:6px}
.del{
  background:#ef4444;color:white;border:none;
  border-radius:6px;padding:2px 6px;
  font-size:12px;margin-left:6px;cursor:pointer;
}

/* FAB */
.fab{
  position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
  background:#4CAF50;color:white;border:none;
  padding:14px 26px;border-radius:30px;font-size:16px;font-weight:700
}

/* SHEET */
.sheet{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-end;z-index:1000}
.sheet-box{background:white;width:100%;padding:20px;border-radius:28px 28px 0 0}
.sheet-box input,.sheet-box select{
  width:100%;padding:14px;margin-top:12px;border-radius:16px;border:1px solid #ddd
}
.sheet-actions{display:flex;gap:10px;margin-top:18px}
.sheet-actions button{flex:1;padding:14px;border-radius:18px;border:none;font-weight:700}
.save{background:#4CAF50;color:white}
.cancel{background:#e5e7eb}

/* MODALS */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:2000}
.modal-box{background:white;width:80%;max-width:320px;padding:20px;border-radius:22px;text-align:center}
.modal-actions{display:flex;gap:10px;margin-top:18px}
.modal-actions button{flex:1;padding:12px;border-radius:14px;border:none;font-weight:700}
.danger{background:#ef4444;color:white}

/* QUICK SETUP – UPGRADED */
.quick-setup{
  background:linear-gradient(135deg,#f8fafc,#eef2ff);
  border:1px solid #e5e7eb;
}

.qs-header{
  font-weight:700;
  font-size:16px;
  margin-bottom:10px;
}

.qs-header small{
  display:block;
  font-weight:500;
  font-size:12px;
  color:#6b7280;
  margin-top:2px;
}

.quick-setup input{
  background:white;
  border:1px solid #dbeafe;
}

.quick-setup input:focus{
  outline:none;
  border-color:#2563eb;
  box-shadow:0 0 0 2px rgba(37,99,235,.15);
}

.quick-setup .save{
  margin-top:14px;
  background:#2563eb;
  border-radius:16px;
  font-size:15px;
}

.modal-box{
  max-height:80vh;           /* fits mobile screen */
  overflow:hidden;
  display:flex;
  flex-direction:column;
}
#quickEditList{
  overflow-y:auto;
  max-height:45vh;           /* scroll area */
  padding-right:4px;
}
#quickEditList input{
  padding:10px;
  border-radius:12px;
  border:1px solid #ddd;
  font-size:14px;
}

/* name field = big */
#quickEditList input[type="text"]{
  flex:1;
}

/* amount field = small */
#quickEditList input[type="number"]{
  width:90px;
  text-align:right;
}


</style>
</head>

<body>

<div class="app">
<header>💰 MyExpense</header>

<div class="wallet">
<button class="wallet-btn" style="top:14px" onclick="openBalanceModal()">➕ Add</button>
<button class="wallet-btn" style="top:52px" onclick="openEditBalance()">✏️ Edit</button>
  <small>Current Balance</small>
  <h1>₹<span id="currentBalance">0</span></h1>
  <div class="progress"><div class="progress-fill" id="progressFill"></div></div>
  <div class="wallet-row">
    <span>Total ₹<span id="totalBalance">0</span></span>
    <span>Spent ₹<span id="totalSpent">0</span></span>
  </div>
</div>

<div class="actions">
  <button onclick="exportExcel()">⬇ Excel</button>
  <button onclick="openClear()">🧹 Clear</button>
</div>

<!-- QUICK SETUP -->
<div class="card quick-setup" id="quickSetup">
  <div class="qs-header">
    ⚡ Quick Expense Setup
    <small>Tap once to add common expenses</small>
  </div>

  <div style="display:flex;gap:8px">
    <input id="q1n" placeholder="Food">
    <input id="q1a" type="number" placeholder="₹">
  </div>

  <div style="display:flex;gap:8px">
    <input id="q2n" placeholder="Travel">
    <input id="q2a" type="number" placeholder="₹">
  </div>

  <div style="display:flex;gap:8px">
    <input id="q3n" placeholder="Shopping">
    <input id="q3a" type="number" placeholder="₹">
  </div>

  <button class="save" onclick="saveQuick()">Save</button>
</div>

<!-- QUICK EXPENSE BUTTONS -->
<div class="card">
  <strong>
  ⚡ Quick Expenses
  <span class="edit-btn" onclick="openQuickEdit()">Edit</span>
</strong>
<div class="quick" id="quickBox"></div>
</div>

<!-- EDIT QUICK EXPENSES -->
<div class="modal" id="editQuickModal">
  <div class="modal-box">
    <strong>Edit Quick Expenses</strong>

<div id="quickEditList" style="margin-top:12px;flex:1"></div>


    <div class="modal-actions">
      <button onclick="closeQuickEdit()">Cancel</button>
      <button class="save" onclick="saveQuickEdit()">Save</button>
    </div>
  </div>
</div>



<!-- PIE CHART -->
<div class="card">
  <strong>📊 Category Split</strong>
  <select id="pieFilter" onchange="drawPie()" style="width:100%;margin:10px 0;padding:10px;border-radius:12px">
    <option value="today">Today</option>
    <option value="week">Weekly</option>
    <option value="month">Monthly</option>
    <option value="year">Yearly</option>
  </select>
  <canvas id="pieCanvas"></canvas>
</div>

<div class="card">
  <strong>🧾 Expense History</strong>
  <div id="list"></div>
</div>
</div>

<button class="fab" onclick="openSheet()">➕ Add Expense</button>

<!-- ADD EXPENSE -->
<div class="sheet" id="sheet">
  <div class="sheet-box">
    <input type="number" id="amount" placeholder="Amount ₹">
  <select id="category" onchange="toggleCustomCategory()">
  <option>Metro</option>
  <option>Auto</option>
  <option>Bus</option>
  <option>Car</option>
  <option>Train</option>
  <option>Flights</option>
  <option>Grocery</option>
  <option>Shopping</option>
  <option>Food</option>
  <option>Medical</option>
  <option value="Other">Other</option>
</select>

<input
  type="text"
  id="customCategory"
  placeholder="Enter expense name (Movie, Party, etc)"
  style="display:none"
/>

    <input type="date" id="date">
    <div class="sheet-actions">
      <button class="cancel" onclick="closeSheet()">Cancel</button>
      <button class="save" onclick="addExpense()">Save</button>
    </div>
  </div>
</div>

<!-- BALANCE -->
<div class="modal" id="balanceModal">
  <div class="modal-box">
    <strong>Add Balance</strong>
    <input type="number" id="balanceInput" placeholder="Amount ₹">
    <div class="modal-actions">
      <button onclick="closeBalance()">Cancel</button>
      <button class="save" onclick="saveBalance()">Add</button>
    </div>
  </div>
</div>

<!-- EDIT BALANCE -->
<div class="modal" id="editBalanceModal">
  <div class="modal-box">
    <strong>Edit Balance</strong>
    <input type="number" id="editBalanceInput" placeholder="Enter correct balance ₹">

    <div class="modal-actions">
      <button onclick="closeEditBalance()">Cancel</button>
      <button class="save" onclick="saveEditedBalance()">Update</button>
    </div>
  </div>
</div>


<!-- CLEAR -->
<div class="modal" id="clearModal">
  <div class="modal-box">
    <strong>Clear all data?</strong>
    <div class="modal-actions">
      <button onclick="closeClear()">Cancel</button>
      <button class="danger" onclick="confirmClear()">Yes</button>
    </div>
  </div>
</div>

<!-- DELETE CONFIRM -->
<div class="modal" id="deleteModal">
  <div class="modal-box">
    <strong>Delete this expense?</strong>
    <p style="font-size:13px;color:#6b7280;margin-top:6px">
      This action cannot be undone
    </p>
    <div class="modal-actions">
      <button onclick="closeDelete()">Cancel</button>
      <button class="danger" onclick="confirmDeleteYes()">Delete</button>
    </div>
  </div>
</div>

<div id="toast" style="
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#16a34a;
  color:white;
  padding:14px 24px;
  border-radius:18px;
  font-weight:600;
  font-size:15px;
  display:none;
  z-index:3000;
  box-shadow:0 15px 30px rgba(0,0,0,.2);
">


<script>

  let deleteDate = null;
let deleteIndex = null;

const totalBalanceEl=document.getElementById("totalBalance");
const totalSpentEl=document.getElementById("totalSpent");
const currentBalanceEl=document.getElementById("currentBalance");
const progressFill=document.getElementById("progressFill");
const list=document.getElementById("list");
const quickBox=document.getElementById("quickBox");

let expenses=JSON.parse(localStorage.getItem("expenses"))||[];
let totalBalance=Number(localStorage.getItem("totalBalance"))||0;
let quickExpenses=JSON.parse(localStorage.getItem("quickExpenses"))||[];
let quickConfigured=localStorage.getItem("quickConfigured")==="true";
let pieChart=null;

date.value=new Date().toISOString().slice(0,10);

function saveQuick(){
  quickExpenses=[
    {name:q1n.value,amt:+q1a.value},
    {name:q2n.value,amt:+q2a.value},
    {name:q3n.value,amt:+q3a.value}
  ].filter(q=>q.name&&q.amt>0);

  localStorage.setItem("quickExpenses",JSON.stringify(quickExpenses));
  localStorage.setItem("quickConfigured","true");
  quickConfigured=true;
  quickSetup.style.display="none";
  renderQuick();
}

function editQuick(){quickSetup.style.display="block"}

function renderQuick(){
  quickBox.innerHTML = "";

  if(!quickConfigured){
    quickSetup.style.display = "block";
    return;
  }

  quickSetup.style.display = "none";

  quickExpenses.forEach(q=>{
    let b = document.createElement("button");
    b.innerText = `${q.name} ₹${q.amt}`;

    b.onclick = () => {
      expenses.push({
        amount: q.amt,
        category: q.name,
        date: date.value
      });

      localStorage.setItem("expenses", JSON.stringify(expenses));
      render();

      showToast(`✅ ${q.name} ₹${q.amt} added`);
    };

    quickBox.appendChild(b);
  });
}

function isSameWeek(d1,d2){
  return Math.floor(d1/86400000/7)===Math.floor(d2/86400000/7);
}

function render(){
  list.innerHTML="";
  let spent=0,grp={};

  expenses.forEach(e=>{
    spent+=e.amount;
    grp[e.date]=grp[e.date]||[];
    grp[e.date].push(e);
  });

  Object.keys(grp).reverse().forEach(d=>{
    let c=document.createElement("div");
    c.className="day-card";
    c.innerHTML=`<div class="day-title">🗓️ ${d}</div>`;
    grp[d].forEach((e,i)=>{
      c.innerHTML+=`
        <div class="expense">
          <span>${e.category}</span>
          <span>₹${e.amount}
      <button class="del" onclick="openDelete('${d}',${i})">✕</button>


          </span>
        </div>`;
    });
    list.appendChild(c);
  });

  totalBalanceEl.innerText=totalBalance;
  totalSpentEl.innerText=spent;
  currentBalanceEl.innerText=totalBalance-spent;
  progressFill.style.width=(totalBalance?Math.min(spent/totalBalance*100,100):0)+"%";
  drawPie();
}

function drawPie(){
  let data={},now=new Date();
  let filter=document.getElementById("pieFilter").value;

  expenses.forEach(e=>{
    let d=new Date(e.date),ok=false;
    if(filter==="today") ok=d.toDateString()===now.toDateString();
    if(filter==="week") ok=isSameWeek(d,now);
    if(filter==="month") ok=d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
    if(filter==="year") ok=d.getFullYear()===now.getFullYear();
    if(ok) data[e.category]=(data[e.category]||0)+e.amount;
  });

  if(pieChart) pieChart.destroy();
  pieChart=new Chart(pieCanvas,{type:"pie",data:{labels:Object.keys(data),datasets:[{data:Object.values(data)}]}});
}

function deleteExpense(date,index){
  let count=-1;
  expenses=expenses.filter(e=>{
    if(e.date===date){count++;return count!==index}
    return true;
  });
  localStorage.setItem("expenses",JSON.stringify(expenses));
  render();
}

function addExpense(){
  let finalCategory =
    category.value === "Other" && customCategory.value.trim()
      ? customCategory.value.trim()
      : category.value;

  expenses.push({
    amount: +amount.value,
    category: finalCategory,
    date: date.value
  });

  localStorage.setItem("expenses", JSON.stringify(expenses));

  // reset custom field
  customCategory.value = "";
  customCategory.style.display = "none";
  category.value = "Metro";

  closeSheet();
  render();

  setTimeout(()=>{
    showToast(`✅ ${finalCategory} added`);
  },300);
}

function exportExcel(){
  let rows=["Date,Category,Amount"];
  expenses.forEach(e=>rows.push(`${e.date},${e.category},${e.amount}`));
  let a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([rows.join("\n")],{type:"text/csv"}));
  a.download="MyExpense.csv";a.click();
}

function openSheet(){sheet.style.display="flex"}
function closeSheet(){sheet.style.display="none"}
function openBalanceModal(){balanceModal.style.display="flex"}
function closeBalance(){balanceModal.style.display="none"}
function saveBalance(){
  const amt = +balanceInput.value;
  if(!amt) return;

  totalBalance += amt;
  localStorage.setItem("totalBalance", totalBalance);

  closeBalance();
  render();

  setTimeout(()=>{
    showToast(`💰 Balance ₹${amt} added`);
  },200);
}
function showToast(msg){
  const toast = document.getElementById("toast");
  toast.innerText = msg;

  toast.style.background = "#2563eb"; // 🔵 CHANGE COLOR HERE

  toast.style.display = "block";

  setTimeout(()=>{
    toast.style.display = "none";
  },2000);
}


function openClear(){clearModal.style.display="flex"}
function closeClear(){clearModal.style.display="none"}
function confirmClear(){
  localStorage.clear();
  expenses=[];totalBalance=0;
  closeClear();render();
}

renderQuick();
render();


function openDelete(date, index){
  deleteDate = date;
  deleteIndex = index;
  deleteModal.style.display = "flex";
}

function closeDelete(){
  deleteModal.style.display = "none";
  deleteDate = null;
  deleteIndex = null;
}

function confirmDeleteYes(){
  deleteExpense(deleteDate, deleteIndex);
  closeDelete();
}

function toggleCustomCategory(){
  const cat = category.value;
  const custom = document.getElementById("customCategory");

  if(cat === "Other"){
    custom.style.display = "block";
    custom.focus();
  }else{
    custom.style.display = "none";
    custom.value = "";
  }
}
function openEditBalance(){
  editBalanceInput.value = totalBalance; // show current balance
  editBalanceModal.style.display = "flex";
}

function closeEditBalance(){
  editBalanceModal.style.display = "none";
}

function saveEditedBalance(){
  const newBalance = +editBalanceInput.value;

  if(newBalance < 0){
    showToast("❌ Balance cannot be negative");
    return;
  }

  totalBalance = newBalance;
  localStorage.setItem("totalBalance", totalBalance);

  closeEditBalance();
  render();

  showToast("✏️ Balance updated successfully");
}

function openQuickEdit(){
  const box = document.getElementById("quickEditList");
  box.innerHTML = "";

  // defaults only for UI
  const defaults = [
    { name: "Food", amt: "" },
    { name: "Travel", amt: "" },
    { name: "Others", amt: "" }
  ];

  // merge existing + defaults (UI only)
  const list = [...quickExpenses];
  while(list.length < 3){
    list.push(defaults[list.length]);
  }

  list.slice(0,3).forEach((q, i) => {
    box.innerHTML += `
      <div style="display:flex;gap:8px;margin-bottom:8px;align-items:center">
        <span style="font-weight:600">₹</span>
        <input type="number" id="qe-amt-${i}" value="${q.amt ?? ""}" placeholder="Amt">
        <input type="text" id="qe-name-${i}" value="${q.name ?? ""}" placeholder="Name">
      </div>
    `;
  });

  editQuickModal.style.display = "flex";
}


function closeQuickEdit(){
  editQuickModal.style.display = "none";
}

function saveQuickEdit(){
  let updated = [];

  for(let i = 0; i < 3; i++){
    const name = document.getElementById(`qe-name-${i}`).value.trim();
    const amt = +document.getElementById(`qe-amt-${i}`).value;

    // user choice: skip empty rows
    if(name && amt > 0){
      updated.push({ name, amt });
    }
  }

  quickExpenses = updated;
  localStorage.setItem("quickExpenses", JSON.stringify(quickExpenses));

  closeQuickEdit();
  renderQuick();

  showToast("✏️ Quick expenses updated");
}


</script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>


</body>
</html>
